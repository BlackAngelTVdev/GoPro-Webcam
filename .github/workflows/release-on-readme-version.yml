name: Build & Release on README version change

on:
  push:
    branches: [ main ]
    paths:
      - README.md

jobs:
  check-version:
    name: Extract README version
    runs-on: ubuntu-latest
    outputs:
      changed: ${{ steps.extract.outputs.changed }}
      curr_ver: ${{ steps.extract.outputs.curr_ver }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract README versions (bash)
        id: extract
        shell: bash
        run: |
          set -euo pipefail
          curr_line=$(sed -n '1p' README.md || true)
          prev_commit=$(git rev-parse HEAD^ 2>/dev/null || true)
          prev_line=""
          if [ -n "$prev_commit" ]; then
            prev_line=$(git show ${prev_commit}:README.md 2>/dev/null | sed -n '1p' || true)
          fi

          curr_ver=$(echo "$curr_line" | grep -oE 'v[0-9A-Za-z._-]+' || true)
          if [ -z "$curr_ver" ]; then
            curr_ver=$(echo "$curr_line" | grep -oE '[0-9]+[.][0-9A-Za-z._-]+' || true)
            if [ -n "$curr_ver" ]; then
              curr_ver="v$curr_ver"
            fi
          fi

          prev_ver=$(echo "$prev_line" | grep -oE 'v[0-9A-Za-z._-]+' || true)
          if [ -z "$prev_ver" ]; then
            prev_ver=$(echo "$prev_line" | grep -oE '[0-9]+[.][0-9A-Za-z._-]+' || true)
            if [ -n "$prev_ver" ]; then
              prev_ver="v$prev_ver"
            fi
          fi

          echo "curr_line=$curr_line" >> $GITHUB_OUTPUT
          echo "prev_line=$prev_line" >> $GITHUB_OUTPUT
          echo "curr_ver=$curr_ver" >> $GITHUB_OUTPUT
          echo "prev_ver=$prev_ver" >> $GITHUB_OUTPUT

          if [ -n "$curr_ver" ] && [ "$curr_ver" != "$prev_ver" ]; then
            echo "changed=true" >> $GITHUB_OUTPUT
          else
            echo "changed=false" >> $GITHUB_OUTPUT
          fi

      - name: Debug info
        if: always()
        run: |
          echo "prev: ${{ steps.extract.outputs.prev_ver }}"
          echo "curr: ${{ steps.extract.outputs.curr_ver }}"
          echo "changed: ${{ steps.extract.outputs.changed }}"

  create-release:
    name: Create GitHub Release
    needs: check-version
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      upload_url: ${{ steps.create_release.outputs.upload_url }}
    if: needs.check-version.outputs.changed == 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate release notes body
        id: notes
        shell: bash
        env:
          CURR_VER: ${{ needs.check-version.outputs.curr_ver }}
        run: |
          set -euo pipefail

          prev_tag=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || true)
          if [ -n "$prev_tag" ]; then
            range="$prev_tag..HEAD"
            range_label="Changes since $prev_tag"
          else
            first_commit=$(git rev-list --max-parents=0 HEAD | tail -n 1)
            range="$first_commit..HEAD"
            range_label="Changes since initial commit"
          fi

          commits_table="| Commit | Message | Author |\n|---|---|---|\n"
          log_lines=$(git log "$range" --reverse --pretty=format:'%h%x09%s%x09%an' || true)

          if [ -z "$log_lines" ]; then
            commits_table+="| - | No commits found in selected range | - |\n"
          else
            while IFS=$'\t' read -r sha subject author; do
              safe_subject=$(echo "$subject" | sed 's/|/\\|/g')
              safe_author=$(echo "$author" | sed 's/|/\\|/g')
              commits_table+="| \\`$sha\\` | $safe_subject | $safe_author |\\n"
            done <<< "$log_lines"
          fi

          authors_list=$(git log "$range" --pretty=format:'- %an' | sort -u || true)
          authors_count=$(git log "$range" --pretty=format:'%an' | sort -u | wc -l | tr -d ' ' || true)
          if [ -z "$authors_list" ]; then
            authors_list="- Unknown"
            authors_count="1"
          fi

          {
            echo "## GoPro-Webcam $CURR_VER - Detailed release notes"
            echo
            echo "### Summary"
            echo "$range_label"
            echo
            echo "### Commits"
            printf "%b" "$commits_table"
            echo
            echo "### Release Contributors ($authors_count)"
            echo "$authors_list"
          } > RELEASE_BODY.md

          {
            echo "body<<EOF"
            cat RELEASE_BODY.md
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        id: create_release
        uses: actions/create-release@v1
        with:
          tag_name: ${{ needs.check-version.outputs.curr_ver }}
          release_name: GoPro-Webcam ${{ needs.check-version.outputs.curr_ver }} - Full changelog and builds
          body: ${{ steps.notes.outputs.body }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-linux:
    name: Build (Linux)
    needs: create-release
    runs-on: ubuntu-latest
    if: needs.check-version.outputs.changed == 'true'
    continue-on-error: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Build Linux executable (PyInstaller)
        run: |
          python -m PyInstaller --onefile --name GoPro-Webcam-linux main.py

      - name: Upload Linux asset
        uses: actions/upload-release-asset@v1
        with:
          upload_url: ${{ needs.create-release.outputs.upload_url }}
          asset_path: dist/GoPro-Webcam-linux
          asset_name: GoPro-Webcam-linux
          asset_content_type: application/octet-stream
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-macos:
    name: Build (macOS)
    needs: create-release
    runs-on: macos-latest
    if: needs.check-version.outputs.changed == 'true'
    continue-on-error: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Build macOS executable (PyInstaller)
        run: |
          python -m PyInstaller --onefile --name GoPro-Webcam-macos main.py

      - name: Upload macOS asset
        uses: actions/upload-release-asset@v1
        with:
          upload_url: ${{ needs.create-release.outputs.upload_url }}
          asset_path: dist/GoPro-Webcam-macos
          asset_name: GoPro-Webcam-macos
          asset_content_type: application/octet-stream
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-windows:
    name: Build (Windows)
    needs: create-release
    runs-on: windows-latest
    if: needs.check-version.outputs.changed == 'true'
    continue-on-error: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
      - name: Build Windows executable (PyInstaller)
        run: |
          python -m PyInstaller --onefile --noconsole --name GoPro-Webcam main.py
      - name: Upload Windows asset
        uses: actions/upload-release-asset@v1
        with:
          upload_url: ${{ needs.create-release.outputs.upload_url }}
          asset_path: dist/GoPro-Webcam.exe
          asset_name: GoPro-Webcam-windows.exe
          asset_content_type: application/octet-stream
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}