name: Build & Release on README version change

on:
  push:
    branches: [ main ]
    paths:
      - README.md

jobs:
  check-version:
    name: Extract README version
    runs-on: ubuntu-latest
    outputs:
      changed: ${{ steps.extract.outputs.changed }}
      curr_ver: ${{ steps.extract.outputs.curr_ver }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract README versions (bash)
        id: extract
        shell: bash
        run: |
          set -euo pipefail
          curr_line=$(sed -n '1p' README.md || true)
          prev_commit=$(git rev-parse HEAD^ 2>/dev/null || true)
          prev_line=""
          if [ -n "$prev_commit" ]; then
            prev_line=$(git show ${prev_commit}:README.md 2>/dev/null | sed -n '1p' || true)
          fi

          # Accept versions like vB1.01, v1.2.3, 1.2.3, v1_2_3 etc.
          curr_ver=$(echo "$curr_line" | grep -oE 'v[0-9A-Za-z._-]+' || true)
          if [ -z "$curr_ver" ]; then
            curr_ver=$(echo "$curr_line" | grep -oE '[0-9]+[.][0-9A-Za-z._-]+' || true)
            if [ -n "$curr_ver" ]; then
              curr_ver="v$curr_ver"
            fi
          fi

          prev_ver=$(echo "$prev_line" | grep -oE 'v[0-9A-Za-z._-]+' || true)
          if [ -z "$prev_ver" ]; then
            prev_ver=$(echo "$prev_line" | grep -oE '[0-9]+[.][0-9A-Za-z._-]+' || true)
            if [ -n "$prev_ver" ]; then
              prev_ver="v$prev_ver"
            fi
          fi

          echo "curr_line=$curr_line" >> $GITHUB_OUTPUT
          echo "prev_line=$prev_line" >> $GITHUB_OUTPUT
          echo "curr_ver=$curr_ver" >> $GITHUB_OUTPUT
          echo "prev_ver=$prev_ver" >> $GITHUB_OUTPUT

          if [ -n "$curr_ver" ] && [ "$curr_ver" != "$prev_ver" ]; then
            echo "changed=true" >> $GITHUB_OUTPUT
          else
            echo "changed=false" >> $GITHUB_OUTPUT
          fi

      - name: Debug info
        if: always()
        run: |
          echo "prev: ${{ steps.extract.outputs.prev_ver }}"
          echo "curr: ${{ steps.extract.outputs.curr_ver }}"
          echo "changed: ${{ steps.extract.outputs.changed }}"

  build-and-release:
    name: Build and release (Windows)
    needs: check-version
    if: needs.check-version.outputs.changed == 'true'
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Build Windows executable (PyInstaller)
        run: |
          python -m PyInstaller --onefile --noconsole --name GoPro-Webcam main.py

      - name: Create GitHub Release
        id: create_release
        uses: actions/create-release@v1
        with:
          tag_name: ${{ needs.check-version.outputs.curr_ver }}
          release_name: Release ${{ needs.check-version.outputs.curr_ver }}
          body: "Automated release triggered by README version change"
          draft: false
          prerelease: false

      - name: Upload release asset
        uses: actions/upload-release-asset@v1
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: dist/GoPro-Webcam.exe
          asset_name: GoPro-Webcam-windows.exe
          asset_content_type: application/octet-stream
